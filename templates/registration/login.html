<!DOCTYPE html>
{% load static %}
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEI - Login y Calendario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
    <style>
        body { background-color: #f8f9fa; }
        #calendar { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); height: 600px; }
        .fc-event { cursor: pointer; }
    </style>
</head>
<body class="py-5"> 

    <div class="container-fluid px-lg-5">
        <div class="row align-items-center">
            <div class="col-lg-4 mb-5 mb-lg-0">
                <form method="post" class="py-4 px-4 shadow-sm border rounded bg-light mx-auto" style="max-width: 400px;">
                    <div class="text-center">
                        <a href="{% url 'home' %}"><img class="mb-4" src="{% static 'img/logotransparente.png' %}" alt="" height="57"></a>
                    </div>
                    <h1 class="h4 mb-3 fw-normal text-center">Iniciar Sesión</h1>

                    {% if error_message %}
                      <div class="alert alert-danger text-center p-2" style="font-size: 0.9em;">
                        {{ error_message }}
                      </div>
                    {% endif %}

                    {% csrf_token %}
                    <div class="form-floating mb-3">
                      <input type="text" class="form-control" id="id_username" name="username" placeholder="Usuario">
                      <label for="id_username">Username</label>
                    </div>
                    <div class="form-floating mb-3">
                      <input type="password" class="form-control" id="id_password" name="password" placeholder="Contraseña">
                      <label for="id_password">Password</label>
                    </div>

                    <button class="btn btn-primary w-100 py-2" type="submit">Entrar</button>
                    <p class="mt-4 mb-0 text-muted text-center" style="font-size: 0.8em;">Center Of Integrative Ecology</p>
                </form>
            </div>

            <div class="col-lg-8">
                <div class="px-2 text-center mb-3">
                    <h2 class="h5">Disponibilidad de Sala</h2>
                </div>
                <div id='calendar'></div>
            </div>
        </div>
    </div>

    <script>
      document.addEventListener('DOMContentLoaded', function() {
        var calendarEl = document.getElementById('calendar');
        var calendar = new FullCalendar.Calendar(calendarEl, {
          initialView: 'timeGridWeek',
          locale: 'es',
          firstDay: 1, // Lunes
          allDaySlot: false,
          slotMinTime: '08:00:00',
          slotMaxTime: '20:00:00',
          height: 'auto',
          events: '/intranet/reservas/json/', // Django servirá los datos aquí
          eventContent: function(info) {
            return {
              html: `<div class="p-1">
                       <div style="font-weight:bold; font-size:0.8em;">${info.event.title}</div>
                       <div style="font-size:0.75em; opacity:0.8;">${info.event.extendedProps.descripcion || ''}</div>
                     </div>`
            };
          }
        });
        calendar.render();
      });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
